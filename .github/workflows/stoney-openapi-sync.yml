name: Stoney OpenAPI Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyyaml
      - run: python -c "import yaml, json; json.dump(yaml.safe_load(open('frontend/schema.yml')), open('schema.json','w'))"
      - name: Upload to Stoney
        env:
          STONEY_TOKEN: ${{ secrets.STONEY_TOKEN }}
        run: |
          curl -fSs -X POST https://stoneydev.com/api/openapi-syncs/upload \
            -H "Authorization: Bearer $STONEY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @schema.json
