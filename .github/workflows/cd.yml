name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Demo Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy all instances
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEMO_SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.DEMO_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            sudo /opt/docketworks/shared/scripts/uat/uat-deploy-shared.sh
