<!-- @dsCard group="Display" -->
<style>
  :root{
    --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
    --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
    --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
    --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
    --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
    --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
    --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
    --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
    --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
    --radius:0.625rem;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  .dscard{width:360px;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:12px}
  .dscard h4{margin:0;font-size:13px;font-weight:600}
  .dscard .sub{font-size:11px;color:var(--muted-foreground);margin-top:-6px}
  .alert{position:relative;width:100%;border-radius:var(--radius);border:1px solid var(--border);padding:16px}
  .alert .title{font-weight:500;line-height:1;margin:0 0 4px 0;font-size:14px}
  .alert .desc{font-size:13px}
  .alert.default{background:var(--background);color:var(--foreground)}
  .alert.destructive{border-color:color-mix(in oklab,var(--destructive) 50%,transparent);color:var(--destructive)}
</style>
<div class="dscard">
  <h4>Alert</h4>
  <div class="sub">Static inline callout · variants: default, destructive</div>
  <div class="alert default">
    <p class="title">Update available</p>
    <p class="desc">A new version is ready to install.</p>
  </div>
  <div class="alert destructive">
    <p class="title">Something went wrong</p>
    <p class="desc">Your changes could not be saved.</p>
  </div>
</div>
