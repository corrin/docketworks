<!-- @dsCard group="Overlays" -->
<style>
:root{
  --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
  --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
  --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
  --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
  --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
  --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
  --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
  --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
  --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
  --radius:0.625rem;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
.ds-drawer-card{width:360px;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-sizing:border-box;}
.ds-drawer-card *{box-sizing:border-box;}
.ds-title{font-size:13px;font-weight:600;margin:0 0 2px;}
.ds-sub{font-size:11px;color:var(--muted-foreground);margin:0 0 12px;}
.ds-stage{position:relative;background:rgba(0,0,0,0.80);border-radius:calc(var(--radius) - 2px);height:150px;overflow:hidden;}
.ds-sheet{position:absolute;left:0;right:0;bottom:0;background:var(--background);border-top:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:8px 16px 16px;}
.ds-handle{width:100px;height:8px;margin:0 auto 12px;border-radius:9999px;background:var(--muted);}
.ds-dw-title{font-size:15px;font-weight:600;margin:0 0 4px;color:var(--foreground);}
.ds-dw-desc{font-size:11px;color:var(--muted-foreground);margin:0 0 14px;}
.ds-row{display:flex;flex-direction:column;gap:8px;}
.ds-btn{height:32px;display:inline-flex;align-items:center;justify-content:center;padding:0 12px;font-size:12px;font-weight:500;border-radius:calc(var(--radius) - 2px);cursor:default;}
.ds-btn-outline{background:transparent;border:1px solid var(--border);color:var(--foreground);}
.ds-btn-primary{background:var(--primary);color:var(--primary-foreground);border:1px solid var(--primary);}
</style>
<div class="ds-drawer-card">
  <p class="ds-title">Drawer</p>
  <p class="ds-sub">Edge sheet · slide-in · drag handle (bottom)</p>
  <div class="ds-stage">
    <div class="ds-sheet">
      <div class="ds-handle"></div>
      <h3 class="ds-dw-title">Filters</h3>
      <p class="ds-dw-desc">Narrow the job list.</p>
      <div class="ds-row">
        <span class="ds-btn ds-btn-primary">Apply</span>
        <span class="ds-btn ds-btn-outline">Cancel</span>
      </div>
    </div>
  </div>
</div>
