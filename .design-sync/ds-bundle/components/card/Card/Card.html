<!-- @dsCard group="Display" -->
<style>
  :root{
    --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
    --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
    --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
    --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
    --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
    --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
    --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
    --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
    --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
    --radius:0.625rem;--radius-xl:calc(var(--radius) + 4px);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  .dscard{width:360px;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:12px}
  .dscard h4{margin:0;font-size:13px;font-weight:600}
  .dscard .sub{font-size:11px;color:var(--muted-foreground);margin-top:-6px}
  .card{background:var(--card);color:var(--card-foreground);display:flex;flex-direction:column;gap:24px;border-radius:var(--radius-xl);border:1px solid var(--border);padding-top:24px;padding-bottom:24px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .card .hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:0 24px;gap:6px}
  .card .title{font-weight:600;line-height:1;font-size:15px}
  .card .desc{color:var(--muted-foreground);font-size:13px;margin-top:6px}
  .card .action{font-size:18px;color:var(--muted-foreground);line-height:1}
  .card .content{padding:0 24px;font-size:13px}
  .card .footer{display:flex;align-items:center;padding:24px 24px 0;border-top:1px solid var(--border)}
  .card .btn{background:var(--primary);color:var(--primary-foreground);border-radius:var(--radius);padding:6px 14px;font-size:13px;font-weight:500}
</style>
<div class="dscard">
  <h4>Card</h4>
  <div class="sub">Surface · parts: Header/Title/Description/Action/Content/Footer</div>
  <div class="card">
    <div class="hdr">
      <div>
        <div class="title">Job #1042</div>
        <div class="desc">Quoting · due Friday</div>
      </div>
      <div class="action">⋯</div>
    </div>
    <div class="content">Steel bracket fabrication, 12 units.</div>
    <div class="footer"><span class="btn">Open</span></div>
  </div>
</div>
