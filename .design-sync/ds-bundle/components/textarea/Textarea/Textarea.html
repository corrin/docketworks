<!-- @dsCard group="Forms" -->
<div class="ds-card">
  <style>
    :root{
      --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
      --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
      --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
      --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
      --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
      --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
      --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
      --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
      --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
      --radius:0.625rem;
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    }
    .ds-card{width:360px;box-sizing:border-box;padding:20px;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);}
    .ds-title{font-size:13px;font-weight:600;margin:0 0 14px;}
    .ds-label{font-size:12px;color:var(--muted-foreground);margin:0 0 6px;}
    .ds-ta{display:block;width:100%;min-height:4rem;box-sizing:border-box;padding:0.5rem 0.75rem;font-size:14px;font-family:inherit;background:transparent;border:1px solid var(--input);border-radius:calc(var(--radius) - 2px);color:var(--foreground);box-shadow:0 1px 2px rgba(0,0,0,0.04);outline:none;resize:vertical;}
    .ds-ta.focus{border-color:var(--ring);box-shadow:0 0 0 3px color-mix(in oklab, var(--ring) 50%, transparent);}
    .ds-row{margin-bottom:12px;}
  </style>
  <p class="ds-title">Textarea</p>
  <div class="ds-row">
    <p class="ds-label">Default</p>
    <textarea class="ds-ta" readonly>Multi-line free text entry. Grows with content.</textarea>
  </div>
  <div class="ds-row" style="margin-bottom:0;">
    <p class="ds-label">Focused</p>
    <textarea class="ds-ta focus" readonly>Add notes…</textarea>
  </div>
</div>
