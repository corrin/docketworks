<!-- @dsCard group="Forms" -->
<div class="ds-card">
  <style>
    :root{
      --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
      --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
      --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
      --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
      --destructive:oklch(0.577 0.245 27.325);
      --border:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
      --radius:0.625rem;
    }
    .ds-card{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--background);color:var(--foreground);padding:20px;width:360px;box-sizing:border-box}
    .ds-card h3{font-size:13px;font-weight:600;margin:0 0 12px;letter-spacing:.02em;color:var(--foreground)}
    .ds-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
    .ds-row:last-child{margin-bottom:0}
    .b{display:inline-flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;
      border-radius:calc(var(--radius) - 2px);font-size:14px;font-weight:500;height:36px;padding:0 16px;
      border:1px solid transparent;cursor:pointer;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.05)}
    .b.sm{height:32px;padding:0 12px;font-size:13px}
    .b.lg{height:40px;padding:0 24px}
    .b.icon{width:36px;height:36px;padding:0}
    .default{background:var(--primary);color:var(--primary-foreground)}
    .destructive{background:var(--destructive);color:#fff}
    .outline{background:var(--background);border-color:var(--border);color:var(--foreground)}
    .secondary{background:var(--secondary);color:var(--secondary-foreground)}
    .ghost{background:transparent;color:var(--foreground);box-shadow:none}
    .link{background:transparent;color:var(--primary);box-shadow:none;text-decoration:underline;text-underline-offset:4px}
    .lbl{font-size:11px;color:oklch(0.554 0.046 257.417);width:64px;flex:none}
  </style>
  <h3>Button</h3>
  <div class="ds-row">
    <span class="lbl">variants</span>
    <span class="b default">Default</span>
    <span class="b secondary">Secondary</span>
    <span class="b outline">Outline</span>
  </div>
  <div class="ds-row">
    <span class="lbl"></span>
    <span class="b destructive">Destructive</span>
    <span class="b ghost">Ghost</span>
    <span class="b link">Link</span>
  </div>
  <div class="ds-row">
    <span class="lbl">sizes</span>
    <span class="b default sm">Small</span>
    <span class="b default">Default</span>
    <span class="b default lg">Large</span>
    <span class="b default icon">+</span>
  </div>
</div>
