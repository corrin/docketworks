<!-- @dsCard group="Overlays" -->
<style>
:root{
  --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
  --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
  --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
  --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
  --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
  --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
  --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
  --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
  --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
  --radius:0.625rem;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
.ds-pop-card{width:360px;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-sizing:border-box;}
.ds-pop-card *{box-sizing:border-box;}
.ds-title{font-size:13px;font-weight:600;margin:0 0 2px;}
.ds-sub{font-size:11px;color:var(--muted-foreground);margin:0 0 14px;}
.ds-stage{display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 0 6px;}
.ds-trigger{height:36px;display:inline-flex;align-items:center;padding:0 14px;font-size:13px;font-weight:500;border-radius:calc(var(--radius) - 2px);background:transparent;border:1px solid var(--border);color:var(--foreground);}
.ds-content{width:240px;background:var(--popover);color:var(--popover-foreground);border:1px solid var(--border);border-radius:calc(var(--radius) - 2px);padding:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,.12);}
.ds-c-title{font-size:13px;font-weight:600;margin:0 0 4px;}
.ds-c-desc{font-size:11px;color:var(--muted-foreground);margin:0 0 10px;}
.ds-field{height:30px;border:1px solid var(--input);border-radius:calc(var(--radius) - 4px);display:flex;align-items:center;padding:0 8px;font-size:11px;color:var(--muted-foreground);margin-top:6px;}
</style>
<div class="ds-pop-card">
  <p class="ds-title">Popover</p>
  <p class="ds-sub">Anchored panel · w-72 · p-4 · shadow-md</p>
  <div class="ds-stage">
    <span class="ds-trigger">Options</span>
    <div class="ds-content">
      <p class="ds-c-title">Dimensions</p>
      <p class="ds-c-desc">Set width and height.</p>
      <div class="ds-field">Width</div>
      <div class="ds-field">Height</div>
    </div>
  </div>
</div>
