<!-- @dsCard group="Data & Navigation" -->
<style>
:root{
  --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
  --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
  --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
  --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
  --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
  --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
  --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
  --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
  --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
  --radius:0.625rem;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
.ds-tabs-card{width:360px;box-sizing:border-box;background:var(--card);color:var(--card-foreground);
  border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.ds-tabs-card h3{margin:0 0 12px;font-size:13px;font-weight:600;color:var(--foreground);}
.ds-tabs{display:flex;flex-direction:column;gap:8px;}
.ds-tabs-list{display:inline-flex;height:36px;width:fit-content;align-items:center;justify-content:center;
  background:var(--muted);color:var(--muted-foreground);border-radius:var(--radius);padding:3px;box-sizing:border-box;}
.ds-tab{display:inline-flex;height:calc(100% - 1px);align-items:center;justify-content:center;gap:6px;
  border-radius:calc(var(--radius) - 2px);border:1px solid transparent;padding:4px 10px;font-size:14px;
  font-weight:500;white-space:nowrap;color:var(--foreground);cursor:pointer;}
.ds-tab.active{background:var(--background);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.ds-tabs-content{padding-top:6px;font-size:14px;color:var(--foreground);}
</style>
<div class="ds-tabs-card">
  <h3>Tabs</h3>
  <div class="ds-tabs">
    <div class="ds-tabs-list">
      <span class="ds-tab active">Estimate</span>
      <span class="ds-tab">Quote</span>
      <span class="ds-tab">Reality</span>
    </div>
    <div class="ds-tabs-content">Estimate cost set — 3 lines, $1,240 total.</div>
  </div>
</div>
