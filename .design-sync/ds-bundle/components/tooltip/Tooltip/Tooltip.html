<!-- @dsCard group="Overlays" -->
<style>
:root{
  --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
  --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
  --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
  --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
  --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
  --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
  --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
  --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
  --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
  --radius:0.625rem;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
.ds-tip-card{width:360px;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-sizing:border-box;}
.ds-tip-card *{box-sizing:border-box;}
.ds-title{font-size:13px;font-weight:600;margin:0 0 2px;}
.ds-sub{font-size:11px;color:var(--muted-foreground);margin:0 0 16px;}
.ds-stage{display:flex;flex-direction:column;align-items:center;gap:0;padding:14px 0 18px;}
.ds-bubble{position:relative;background:var(--foreground);color:var(--background);border-radius:calc(var(--radius) - 2px);padding:6px 12px;font-size:12px;line-height:1;}
.ds-arrow{width:9px;height:9px;background:var(--foreground);transform:rotate(45deg);border-radius:2px;margin-top:-4px;}
.ds-trigger{margin-top:10px;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border-radius:calc(var(--radius) - 2px);color:var(--foreground);border:1px solid var(--border);background:transparent;}
</style>
<div class="ds-tip-card">
  <p class="ds-title">Tooltip</p>
  <p class="ds-sub">Hover hint · dark bubble · arrow · text-xs</p>
  <div class="ds-stage">
    <div class="ds-bubble">Charge-out rate per hour</div>
    <div class="ds-arrow"></div>
    <span class="ds-trigger">?</span>
  </div>
</div>
