<!-- @dsCard group="Data & Navigation" -->
<style>
:root{
  --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
  --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
  --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
  --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
  --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
  --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
  --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
  --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
  --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
  --radius:0.625rem;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
.ds-col-card{width:360px;box-sizing:border-box;background:var(--card);color:var(--card-foreground);
  border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.ds-col-card h3{margin:0 0 12px;font-size:13px;font-weight:600;color:var(--foreground);}
.ds-col-trigger{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 10px;
  font-size:14px;font-weight:500;color:var(--foreground);background:transparent;border:none;
  border-radius:calc(var(--radius) - 2px);cursor:pointer;}
.ds-col-trigger:hover{background:var(--accent);}
.ds-col-trigger svg{width:16px;height:16px;}
.ds-col-content{margin-top:8px;padding:12px;font-size:14px;color:var(--foreground);
  background:var(--muted);border-radius:calc(var(--radius) - 2px);}
</style>
<div class="ds-col-card">
  <h3>Collapsible</h3>
  <button class="ds-col-trigger">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    Hide details
  </button>
  <div class="ds-col-content">Extra job details revealed here — materials, labour, notes.</div>
</div>
