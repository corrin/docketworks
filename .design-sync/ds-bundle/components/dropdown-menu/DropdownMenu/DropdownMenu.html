<!-- @dsCard group="Overlays" -->
<style>
:root{
  --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
  --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
  --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
  --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
  --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
  --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
  --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
  --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
  --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
  --radius:0.625rem;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
.ds-dm-card{width:360px;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-sizing:border-box;}
.ds-dm-card *{box-sizing:border-box;}
.ds-title{font-size:13px;font-weight:600;margin:0 0 2px;}
.ds-sub{font-size:11px;color:var(--muted-foreground);margin:0 0 14px;}
.ds-stage{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0 6px;}
.ds-trigger{height:36px;display:inline-flex;align-items:center;padding:0 14px;font-size:13px;font-weight:500;border-radius:calc(var(--radius) - 2px);background:transparent;border:1px solid var(--border);color:var(--foreground);}
.ds-menu{width:200px;background:var(--popover);color:var(--popover-foreground);border:1px solid var(--border);border-radius:calc(var(--radius) - 2px);padding:4px;box-shadow:0 4px 6px -1px rgba(0,0,0,.12);}
.ds-label{padding:6px 8px;font-size:12px;font-weight:500;color:var(--foreground);}
.ds-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;font-size:13px;border-radius:calc(var(--radius) - 4px);color:var(--foreground);}
.ds-item.hl{background:var(--accent);color:var(--accent-foreground);}
.ds-item.destr{color:var(--destructive);}
.ds-kbd{font-size:11px;letter-spacing:.12em;color:var(--muted-foreground);}
.ds-sep{height:1px;background:var(--border);margin:4px -4px;}
</style>
<div class="ds-dm-card">
  <p class="ds-title">DropdownMenu</p>
  <p class="ds-sub">Action menu · items · separator · destructive</p>
  <div class="ds-stage">
    <span class="ds-trigger">Actions</span>
    <div class="ds-menu">
      <div class="ds-label">Job</div>
      <div class="ds-item hl"><span>Edit</span><span class="ds-kbd">⌘E</span></div>
      <div class="ds-item"><span>Duplicate</span></div>
      <div class="ds-sep"></div>
      <div class="ds-item destr"><span>Delete</span></div>
    </div>
  </div>
</div>
