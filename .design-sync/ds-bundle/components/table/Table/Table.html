<!-- @dsCard group="Data & Navigation" -->
<style>
:root{
  --background:oklch(1 0 0);--foreground:oklch(0.129 0.042 264.695);
  --card:oklch(1 0 0);--card-foreground:oklch(0.129 0.042 264.695);
  --popover:oklch(1 0 0);--popover-foreground:oklch(0.129 0.042 264.695);
  --primary:oklch(0.208 0.042 265.755);--primary-foreground:oklch(0.984 0.003 247.858);
  --secondary:oklch(0.968 0.007 247.896);--secondary-foreground:oklch(0.208 0.042 265.755);
  --muted:oklch(0.968 0.007 247.896);--muted-foreground:oklch(0.554 0.046 257.417);
  --accent:oklch(0.968 0.007 247.896);--accent-foreground:oklch(0.208 0.042 265.755);
  --destructive:oklch(0.577 0.245 27.325);--destructive-foreground:oklch(0.577 0.245 27.325);
  --border:oklch(0.929 0.013 255.508);--input:oklch(0.929 0.013 255.508);--ring:oklch(0.704 0.04 256.788);
  --radius:0.625rem;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
.ds-table-card{width:360px;box-sizing:border-box;background:var(--card);color:var(--card-foreground);
  border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.ds-table-card h3{margin:0 0 12px;font-size:13px;font-weight:600;color:var(--foreground);}
.ds-table-card table{width:100%;border-collapse:collapse;caption-side:bottom;font-size:14px;}
.ds-table-card thead tr{border-bottom:1px solid var(--border);}
.ds-table-card th{height:40px;padding:0 8px;text-align:left;vertical-align:middle;
  font-weight:500;white-space:nowrap;color:var(--muted-foreground);}
.ds-table-card tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
.ds-table-card tbody tr:last-child{border-bottom:0;}
.ds-table-card tbody tr.sel{background:var(--muted);}
.ds-table-card td{padding:8px;vertical-align:middle;white-space:nowrap;color:var(--foreground);}
.ds-table-card caption{margin-top:16px;font-size:14px;color:var(--muted-foreground);}
</style>
<div class="ds-table-card">
  <h3>Table</h3>
  <table>
    <thead>
      <tr><th>Job</th><th>Status</th><th>Total</th></tr>
    </thead>
    <tbody>
      <tr><td>Sheetmetal duct</td><td>In Progress</td><td>$1,240</td></tr>
      <tr class="sel"><td>Bracket batch</td><td>Quoting</td><td>$480</td></tr>
      <tr><td>Stair rail</td><td>Completed</td><td>$3,910</td></tr>
    </tbody>
    <caption>A list of recent jobs.</caption>
  </table>
</div>
